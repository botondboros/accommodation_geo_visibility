<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c9e87" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c9e87" stop-opacity="0"/>
    </radialGradient>

    <!-- Pipeline node gradient -->
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>

    <filter id="softblur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#c8a96e" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="560" y1="0" x2="560" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="880" y1="0" x2="880" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1040" y1="0" x2="1040" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
  </g>

  <!-- Left accent bar -->
  <rect x="72" y="140" width="3" height="360" fill="#c8a96e" opacity="0.6"/>

  <!-- Main title -->
  <text x="104" y="232" font-family="Georgia, serif" font-size="72" font-weight="400" fill="#e8e6e0" letter-spacing="-2">HR Assistant</text>

  <!-- Italic accent -->
  <text x="104" y="300" font-family="Georgia, serif" font-size="30" font-style="italic" fill="#c8a96e" letter-spacing="0.5">AI-powered job application pipeline</text>

  <!-- Description -->
  <text x="104" y="356" font-family="'Helvetica Neue', Arial, sans-serif" font-size="19" fill="#9a9898" font-weight="300" letter-spacing="0.2">Reads Gmail · Scores jobs with Claude AI · Generates tailored CVs &amp; cover letters</text>
  <text x="104" y="384" font-family="'Helvetica Neue', Arial, sans-serif" font-size="19" fill="#9a9898" font-weight="300" letter-spacing="0.2">Tracks applications · Runs automatically every 48 hours</text>

  <!-- Badges -->
  <rect x="104" y="420" width="130" height="30" rx="15" fill="#1a1a22" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="169" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#c8a96e" text-anchor="middle" font-weight="500">Python 3.10+</text>

  <rect x="246" y="420" width="150" height="30" rx="15" fill="#1a1a22" stroke="#7c9e87" stroke-width="1" stroke-opacity="0.5"/>
  <text x="321" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#7c9e87" text-anchor="middle" font-weight="500">Claude Sonnet 4.6</text>

  <rect x="408" y="420" width="110" height="30" rx="15" fill="#1a1a22" stroke="#6b88c4" stroke-width="1" stroke-opacity="0.5"/>
  <text x="463" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#6b88c4" text-anchor="middle" font-weight="500">Windows</text>

  <rect x="530" y="420" width="80" height="30" rx="15" fill="#1a1a22" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="570" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="500">MIT</text>

  <!-- Pipeline diagram on right -->
  <!-- Connector line -->
  <line x1="900" y1="145" x2="900" y2="520" stroke="#2a2a38" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Node 1: Gmail -->
  <rect x="820" y="118" width="160" height="50" rx="8" fill="url(#nodeGrad)" stroke="#2e2e3e" stroke-width="1"/>
  <rect x="820" y="118" width="3" height="50" rx="2" fill="#c8a96e"/>
  <text x="842" y="138" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#7a7880" font-weight="500" text-transform="uppercase" letter-spacing="1">STAGE 1</text>
  <text x="842" y="156" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#e8e6e0" font-weight="400">Gmail Reader</text>

  <!-- Node 2: Scraper -->
  <rect x="820" y="188" width="160" height="50" rx="8" fill="url(#nodeGrad)" stroke="#2e2e3e" stroke-width="1"/>
  <rect x="820" y="188" width="3" height="50" rx="2" fill="#c8a96e"/>
  <text x="842" y="208" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#7a7880" font-weight="500" letter-spacing="1">STAGE 2</text>
  <text x="842" y="226" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#e8e6e0" font-weight="400">Job Scraper</text>

  <!-- Node 3: Filter (highlighted) -->
  <rect x="812" y="254" width="176" height="54" rx="8" fill="#1e1a12" stroke="#c8a96e" stroke-width="1.5"/>
  <rect x="812" y="254" width="4" height="54" rx="2" fill="#c8a96e"/>
  <text x="836" y="275" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#c8a96e" font-weight="600" letter-spacing="1">STAGE 3</text>
  <text x="836" y="295" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#e8e6e0" font-weight="500">AI Scoring · Claude</text>

  <!-- Node 4: CV Gen -->
  <rect x="820" y="328" width="160" height="50" rx="8" fill="url(#nodeGrad)" stroke="#2e2e3e" stroke-width="1"/>
  <rect x="820" y="328" width="3" height="50" rx="2" fill="#7c9e87"/>
  <text x="842" y="348" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#7a7880" font-weight="500" letter-spacing="1">STAGE 4</text>
  <text x="842" y="366" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#e8e6e0" font-weight="400">CV Generator</text>

  <!-- Node 5: Cover Letter -->
  <rect x="820" y="398" width="160" height="50" rx="8" fill="url(#nodeGrad)" stroke="#2e2e3e" stroke-width="1"/>
  <rect x="820" y="398" width="3" height="50" rx="2" fill="#7c9e87"/>
  <text x="842" y="418" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#7a7880" font-weight="500" letter-spacing="1">STAGE 5</text>
  <text x="842" y="436" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#e8e6e0" font-weight="400">Cover Letters</text>

  <!-- Node 6: Tracker -->
  <rect x="820" y="468" width="160" height="50" rx="8" fill="url(#nodeGrad)" stroke="#2e2e3e" stroke-width="1"/>
  <rect x="820" y="468" width="3" height="50" rx="2" fill="#6b88c4"/>
  <text x="842" y="488" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#7a7880" font-weight="500" letter-spacing="1">STAGE 6</text>
  <text x="842" y="506" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#e8e6e0" font-weight="400">Tracker Dashboard</text>

  <!-- Score bubble -->
  <circle cx="1080" cy="281" r="52" fill="#1a160a" stroke="#c8a96e" stroke-width="1.5"/>
  <text x="1080" y="269" font-family="Georgia, serif" font-size="36" fill="#c8a96e" text-anchor="middle" font-weight="400">88</text>
  <text x="1080" y="289" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#7a7880" text-anchor="middle">/100</text>
  <text x="1080" y="308" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#7c9e87" text-anchor="middle" font-weight="500">STRONG MATCH</text>

  <!-- Bottom stats row -->
  <line x1="72" y1="560" x2="1208" y2="560" stroke="#2a2a38" stroke-width="1"/>

  <text x="104" y="598" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#555" font-weight="300">~$1.55 per full run</text>
  <text x="310" y="598" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#555" font-weight="300">·</text>
  <text x="330" y="598" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#555" font-weight="300">90 jobs scored in ~3 min</text>
  <text x="560" y="598" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#555" font-weight="300">·</text>
  <text x="580" y="598" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#555" font-weight="300">7-day application expiry</text>
  <text x="810" y="598" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#555" font-weight="300">·</text>
  <text x="830" y="598" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#555" font-weight="300">zero false experience claims</text>
</svg>
